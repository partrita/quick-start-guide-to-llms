name: Deploy Quarto Book

on:
  push:
    branches: [ quarto-book ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pixi
        uses: prefix-dev/setup-pixi@v0.8.1
        with:
          pixi-version: latest
          cache: true

      - name: Render Quarto
        shell: pixi run bash {0}
        run: |
          quarto render mybook

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: mybook/_book

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
